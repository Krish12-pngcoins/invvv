<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSN Vault | Fishbowl Enterprise ERP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --fb-blue: #005696; 
            --fb-dark: #1a252f;
            --fb-sidebar: #2c3e50;
            --fb-bg: #f4f7f9;
            --border: #ced4da;
            --success: #28a745;
            --danger: #dc3545;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--fb-bg); color: #333; font-size: 13px; display: flex; height: 100vh; overflow: hidden; }

        /* FISHBOWL SIDEBAR */
        #sidebar { width: 220px; background: var(--fb-sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; background: var(--fb-dark); font-weight: bold; font-size: 16px; border-bottom: 1px solid #3e4f5f; }
        .nav-group { padding: 10px 0; border-bottom: 1px solid #3e4f5f; }
        .nav-label { padding: 5px 20px; font-size: 10px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; }
        .nav-item { padding: 10px 20px; cursor: pointer; transition: 0.2s; color: #bdc3c7; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--fb-blue); color: white; }

        /* MAIN CONTENT AREA */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }

        /* FISHBOWL DASHBOARD HEADER */
        .dashboard-header { 
            background: #eef5fb; 
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            gap: 50px; 
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-box label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        .stat-box .val { font-size: 20px; font-weight: bold; color: var(--fb-blue); }
        .stat-box .sub-val { font-size: 11px; color: var(--success); font-weight: bold; }

        /* TOOLBAR / RIBBON */
        .ribbon { 
            height: 45px; 
            background: #fff; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 10px; 
        }

        /* DATA TABLE */
        .view-container { flex: 1; overflow-y: auto; padding: 0; display: none; }
        .view-container.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; background: #f8f9fa; z-index: 10; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); font-size: 11px; color: #555; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background: #f1f8ff; }

        /* BUTTONS */
        .btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-p { background: var(--fb-blue); color: white; border: none; }
        .btn-s { background: var(--success); color: white; border: none; }
        .btn-sm { padding: 3px 8px; font-size: 11px; }

        /* PRINT BARCODE MODAL */
        #print-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .print-card { background: white; padding: 30px; border-radius: 5px; text-align: center; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; color: black; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">KSN VAULT ERP</div>
    <div class="nav-group">
        <div class="nav-label">Inventory</div>
        <div class="nav-item active" onclick="switchView('inv')">📦 Part Inventory</div>
        <div class="nav-item" onclick="switchView('add')">➕ Receive New Stock</div>
    </div>
    <div class="nav-group">
        <div class="nav-label">Sales</div>
        <div class="nav-item" onclick="switchView('sales')">📈 Sales Order History</div>
        <div class="nav-item" onclick="switchView('cust')">👤 Customer Database</div>
    </div>
</div>

<div id="main">
    <div class="dashboard-header">
        <div class="stat-box"><label>Total Inventory Cost</label><div class="val" id="total-cost">$0.00</div></div>
        <div class="stat-box"><label>Estimated Market Value</label><div class="val" id="total-val">$0.00</div></div>
        <div class="stat-box"><label>Potential Margin</label><div class="val" id="total-margin">$0.00</div><div class="sub-val" id="margin-pct">0%</div></div>
        <div class="stat-box"><label>Units in Stock</label><div class="val" id="total-qty">0</div></div>
    </div>

    <div class="ribbon">
        <button class="btn btn-p" onclick="switchView('add')">+ Add Coin</button>
        <button class="btn" onclick="exportData()">Export CSV</button>
        <div style="flex:1"></div>
        <input type="text" id="global-search" placeholder="Search Inventory..." style="padding:6px; width:250px; border:1px solid var(--border);">
    </div>

    <div id="view-inv" class="view-container active">
        <table>
            <thead>
                <tr>
                    <th>Barcode</th><th>Description</th><th>Date Received</th><th>Source</th><th>Cost</th><th>Est. Value</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="inv-table"></tbody>
        </table>
    </div>

    <div id="view-sales" class="view-container">
        <table>
            <thead>
                <tr>
                    <th>Sale Date</th><th>Item Description</th><th>Customer</th><th>Cost</th><th>Sold Price</th><th>Net Profit</th>
                </tr>
            </thead>
            <tbody id="sales-table"></tbody>
        </table>
    </div>

    <div id="view-add" class="view-container" style="padding:40px;">
        <div style="max-width:500px; background:#f9f9f9; padding:25px; border:1px solid var(--border);">
            <h2 style="margin-bottom:20px;">Receive Stock</h2>
            <div style="margin-bottom:15px;"><label>Coin Name</label><br><input type="text" id="in-name" style="width:100%; padding:8px;"></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div style="flex:1;"><label>Cost Paid</label><br><input type="number" id="in-cost" style="width:100%; padding:8px;"></div>
                <div style="flex:1;"><label>Market Value</label><br><input type="number" id="in-val" style="width:100%; padding:8px;"></div>
            </div>
            <div style="margin-bottom:15px;"><label>Purchase Date</label><br><input type="date" id="in-date" style="width:100%; padding:8px;"></div>
            <button class="btn btn-p" style="width:100%; padding:12px;" onclick="addCoin()">Confirm Receipt</button>
        </div>
    </div>
</div>

<div id="print-overlay" onclick="this.style.display='none'">
    <div class="print-card" id="print-area">
        <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">KSNumismatics</div>
        <svg id="barcode-output"></svg>
        <div id="print-label-name" style="font-size:12px; margin-top:5px;"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ksn_fishbowl')) || { inventory: [], sales: [] };

    function sync() {
        localStorage.setItem('ksn_fishbowl', JSON.stringify(db));
        render();
    }

    function render() {
        let cost = 0, val = 0;
        
        // Inventory Render
        const invBody = document.getElementById('inv-table');
        invBody.innerHTML = db.inventory.map((i, index) => {
            cost += parseFloat(i.cost);
            val += parseFloat(i.value);
            return `
                <tr>
                    <td><svg id="bc-${index}" style="height:30px;"></svg></td>
                    <td><strong>${i.name}</strong></td>
                    <td>${i.date}</td>
                    <td>${i.source || 'Direct'}</td>
                    <td>$${parseFloat(i.cost).toFixed(2)}</td>
                    <td style="color:var(--fb-blue); font-weight:bold;">$${parseFloat(i.value).toFixed(2)}</td>
                    <td>
                        <button class="btn btn-sm" onclick="printLabel(${index})">🖨️ Label</button>
                        <button class="btn btn-sm btn-s" onclick="markSold(${index})">Sell</button>
                    </td>
                </tr>
            `;
        }).join('');

        // Generate Barcodes
        db.inventory.forEach((i, idx) => {
            JsBarcode(`#bc-${idx}`, "KSN"+idx, { displayValue: false, height: 20, width: 1 });
        });

        // Sales Render
        const salesBody = document.getElementById('sales-table');
        salesBody.innerHTML = db.sales.map(s => `
            <tr>
                <td>${s.soldDate}</td>
                <td>${s.name}</td>
                <td>${s.buyer}</td>
                <td>$${s.cost.toFixed(2)}</td>
                <td>$${s.price.toFixed(2)}</td>
                <td style="color:var(--success); font-weight:bold;">+$${(s.price - s.cost).toFixed(2)}</td>
            </tr>
        `).join('');

        // Dashboard Stats
        document.getElementById('total-cost').innerText = "$" + cost.toLocaleString();
        document.getElementById('total-val').innerText = "$" + val.toLocaleString();
        document.getElementById('total-margin').innerText = "$" + (val - cost).toLocaleString();
        document.getElementById('margin-pct').innerText = cost > 0 ? ((val/cost - 1)*100).toFixed(1) + "% ROI" : "0%";
        document.getElementById('total-qty').innerText = db.inventory.length;
    }

    function addCoin() {
        const name = document.getElementById('in-name').value;
        const cost = document.getElementById('in-cost').value;
        const val = document.getElementById('in-val').value;
        const date = document.getElementById('in-date').value;
        if(!name || !cost) return alert("Fill required fields");

        db.inventory.push({ name, cost: parseFloat(cost), value: parseFloat(val), date: date || new Date().toLocaleDateString() });
        sync();
        switchView('inv');
    }

    function markSold(idx) {
        const price = prompt("Enter Sale Price:");
        const buyer = prompt("Enter Customer Name:");
        if(!price) return;
        
        const item = db.inventory.splice(idx, 1)[0];
        db.sales.push({
            ...item,
            price: parseFloat(price),
            buyer: buyer || "Retail",
            soldDate: new Date().toLocaleDateString()
        });
        sync();
    }

    function printLabel(idx) {
        const item = db.inventory[idx];
        document.getElementById('print-overlay').style.display = 'flex';
        document.getElementById('print-label-name').innerText = item.name;
        JsBarcode("#barcode-output", "KSN"+idx, { width: 2, height: 50 });
        setTimeout(() => window.print(), 500);
    }

    function switchView(v) {
        document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    render();
</script>

</body>
</html>
